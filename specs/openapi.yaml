components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PropertyId:
      name: propertyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageCursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Cursor for pagination
    PageLimit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # Error
    Error:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        requestId:
          type: string

    # Auth
    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        username:
          type: string
          pattern: '^[a-zA-Z0-9_]+$'
        phone:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 10

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 8

    MessageResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string

    AuthResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        accessToken:
          type: string
        token:
          type: string
          deprecated: true
        refreshToken:
          type: string
        expiresIn:
          type: integer
        user:
          $ref: '#/components/schemas/User'

    # User
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        roles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: string
        phone:
          type: string

    # Property
    PropertyType:
      type: string
      enum:
        - apartment
        - house
        - condo
        - townhouse
        - cabin
        - cottage
        - villa
        - chalet
        - loft
        - studio
        - guesthouse
        - bnb

    Property:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        propertyType:
          $ref: '#/components/schemas/PropertyType'
        roomType:
          type: string
          enum: [entire_place, private_room, shared_room]
        address:
          $ref: '#/components/schemas/Address'
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        bedrooms:
          type: integer
        beds:
          type: integer
        bathrooms:
          type: number
        maxGuests:
          type: integer
        amenities:
          type: array
          items:
            type: string
        photos:
          type: array
          items:
            $ref: '#/components/schemas/Photo'
        houseRules:
          $ref: '#/components/schemas/HouseRules'
        pricing:
          $ref: '#/components/schemas/PropertyPricing'
        rating:
          type: number
        reviewCount:
          type: integer
        status:
          type: string
          enum: [draft, listed, unlisted, suspended]
        instantBook:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PropertyCreate:
      type: object
      required: [title, propertyType, address, bedrooms, beds, bathrooms, maxGuests]
      properties:
        title:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 5000
        propertyType:
          $ref: '#/components/schemas/PropertyType'
        roomType:
          type: string
          enum: [entire_place, private_room, shared_room]
        address:
          $ref: '#/components/schemas/Address'
        bedrooms:
          type: integer
          minimum: 0
        beds:
          type: integer
          minimum: 1
        bathrooms:
          type: number
          minimum: 0.5
        maxGuests:
          type: integer
          minimum: 1
        amenities:
          type: array
          items:
            type: string

    PropertyUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        amenities:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, listed, unlisted]

    PropertySearchResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Property'
        pagination:
          $ref: '#/components/schemas/Pagination'
        totalCount:
          type: integer

    Address:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string

    Coordinates:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number

    Photo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        caption:
          type: string
        order:
          type: integer
        isCover:
          type: boolean

    HouseRules:
      type: object
      properties:
        checkInTime:
          type: string
        checkOutTime:
          type: string
        smokingAllowed:
          type: boolean
        petsAllowed:
          type: boolean
        partiesAllowed:
          type: boolean

    PropertyPricing:
      type: object
      properties:
        basePrice:
          type: number
        currency:
          type: string
        cleaningFee:
          type: number
        weekendPrice:
          type: number

    # Availability
    AvailabilityResponse:
      type: object
      properties:
        propertyId:
          type: string
          format: uuid
        dates:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityDate'

    AvailabilityDate:
      type: object
      properties:
        date:
          type: string
          format: date
        status:
          type: string
          enum: [available, blocked, booked]
        price:
          type: number
        minNights:
          type: integer

    AvailabilityUpdate:
      type: object
      properties:
        dates:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              status:
                type: string
                enum: [available, blocked]
              price:
                type: number

    PricingRules:
      type: object
      properties:
        basePrice:
          type: number
        currency:
