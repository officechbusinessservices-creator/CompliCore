openapi: 3.1.0
info:
  title: Short-Term Rental Platform API
  description: |
    Vendor-neutral API for property managers, hosts, and guests.
    Built with privacy-by-design and ethical AI principles.
  version: 1.0.0
  contact:
    name: API Support
    email: api-support@example.com
  license:
    name: Proprietary

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://api-staging.example.com/v1
    description: Staging
  - url: http://localhost:4000/v1
    description: Local Development

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Users
    description: User management operations
  - name: Properties
    description: Property listing operations
  - name: Bookings
    description: Booking management
  - name: Payments
    description: Payment processing
  - name: Messages
    description: Guest-host communications
  - name: Reviews
    description: Review management
  - name: Analytics
    description: Reporting and analytics
  - name: AI
    description: AI-powered features
  - name: Economic
    description: RWA and SSI economic activation simulations
  - name: Agentic
    description: Sovereign Agentic Mesh orchestration and liability controls

paths:
  # Authentication
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered

  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many failed attempts; account temporarily locked

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        description: Optional refresh token payload. If omitted, server may use refresh cookie.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout current session
      operationId: logoutUser
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset link
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Too many requests

  /auth/reset-password/{token}:
    post:
      tags: [Authentication]
      summary: Reset password using token
      operationId: resetPassword
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current authenticated user
      operationId: getCurrentAuthUser
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Users
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags: [Users]
      summary: Update current user profile
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # Properties
  /properties:
    get:
      tags: [Properties]
      summary: Search properties
      operationId: searchProperties
      parameters:
        - name: location
          in: query
          schema:
            type: string
          description: Location search (city, address, or coordinates)
        - name: checkIn
          in: query
          schema:
            type: string
            format: date
        - name: checkOut
          in: query
          schema:
            type: string
            format: date
        - name: guests
          in: query
          schema:
            type: integer
            minimum: 1
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: propertyType
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PropertyType'
        - name: amenities
          in: query
          schema:
            type: array
            items:
              type: string
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertySearchResponse'
    post:
      tags: [Properties]
      summary: Create new property listing
      operationId: createProperty
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreate'
      responses:
        '201':
          description: Property created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Property'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /properties/{propertyId}:
    get:
      tags: [Properties]
      summary: Get property details
      operationId: getProperty
      parameters:
        - $ref: '#/components/parameters/PropertyId'
      responses:
        '200':
          description: Property details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Property'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Properties]
      summary: Update property
      operationId: updateProperty
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PropertyId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyUpdate'
      responses:
        '200':
          description: Property updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Property'
    delete:
      tags: [Properties]
      summary: Delete property
      operationId: deleteProperty
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PropertyId'
      responses:
        '204':
          description: Property deleted

  /properties/{propertyId}/availability:
    get:
      tags: [Properties]
      summary: Get property availability
      operationId: getAvailability
      parameters:
        - $ref: '#/components/parameters/PropertyId'
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Availability calendar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
    patch:
      tags: [Properties]
      summary: Update availability
      operationId: updateAvailability
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PropertyId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityUpdate'
      responses:
        '200':
          description: Availability updated

  /properties/{propertyId}/pricing:
    get:
      tags: [Properties]
      summary: Get property pricing rules
      operationId: getPricing
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PropertyId'
      responses:
        '200':
          description: Pricing rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingRules'

  /properties/{propertyId}/quote:
    post:
      tags: [Properties]
      summary: Get booking quote
      operationId: getQuote
      parameters:
        - $ref: '#/components/parameters/PropertyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Price quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'

  # Bookings
  /bookings:
    get:
      tags: [Bookings]
      summary: List user's bookings
      operationId: listBookings
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - name: role
          in: query
          schema:
            type: string
            enum: [guest, host]
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
    post:
      tags: [Bookings]
      summary: Create new booking
      operationId: createBooking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Dates not available

  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: Get booking details
      operationId: getBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'

  /bookings/{bookingId}/access:
    get:
      tags: [Bookings]
      summary: Get booking access credentials
      operationId: getBookingAccess
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking access credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingAccess'
        '403':
          $ref: '#/components/responses/Forbidden'

  /bookings/{bookingId}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel booking
      operationId: cancelBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
      responses:
        '200':
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResponse'

  # Payments
  /payments/methods:
    get:
      tags: [Payments]
      summary: List saved payment methods
      operationId: listPaymentMethods
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethod'

  /payments/checkout:
    post:
      tags: [Payments]
      summary: Process payment for booking
      operationId: processPayment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'

  # Messages
  /messages/threads:
    get:
      tags: [Messages]
      summary: List message threads
      operationId: listThreads
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Message threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageThread'

  /messages/threads/{threadId}:
    get:
      tags: [Messages]
      summary: Get messages in thread
      operationId: getThread
      security:
        - bearerAuth: []
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thread messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageThreadDetail'

  /messages/send:
    post:
      tags: [Messages]
      summary: Send message
      operationId: sendMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  # Reviews
  /reviews:
    post:
      tags: [Reviews]
      summary: Submit review
      operationId: createReview
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /properties/{propertyId}/reviews:
    get:
      tags: [Reviews]
      summary: Get property reviews
      operationId: getPropertyReviews
      parameters:
        - $ref: '#/components/parameters/PropertyId'
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Property reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'

  # AI Features
  /ai/pricing/suggestions:
    get:
      tags: [AI]
      summary: Get AI pricing suggestions
      operationId: getPricingSuggestions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PropertyId'
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Pricing suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingSuggestions'

  /ai/listing/optimize:
    post:
      tags: [AI]
      summary: Get listing optimization suggestions
      operationId: optimizeListing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizeListingRequest'
      responses:
        '200':
          description: Optimization suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingOptimizations'

  # Analytics
  /analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Get dashboard metrics
      operationId: getDashboard
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetrics'

  # Economic Activation
  /economic/activation/status:
    get:
      tags: [Economic]
      summary: Get current economic activation status
      operationId: getEconomicActivationStatus
      responses:
        '200':
          description: Economic activation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EconomicActivationStatus'

  /economic/rwa/mint-simulation:
    post:
      tags: [Economic]
      summary: Simulate ERC-7518 RWA partition mint command
      operationId: simulateRwaMint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RwaMintSimulationRequest'
      responses:
        '200':
          description: Mint simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RwaMintSimulationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /economic/ssi/onboarding-simulation:
    post:
      tags: [Economic]
      summary: Simulate SSI wallet onboarding and selective disclosure flow
      operationId: simulateSsiOnboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsiOnboardingSimulationRequest'
      responses:
        '200':
          description: SSI onboarding simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsiOnboardingSimulationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /economic/rwa/trade-simulation:
    post:
      tags: [Economic]
      summary: Simulate Auto-Verifier trade authorization decision
      operationId: simulateRwaTrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RwaTradeSimulationRequest'
      responses:
        '200':
          description: Trade simulation decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RwaTradeSimulationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /economic/portal/onboarding-config:
    get:
      tags: [Economic]
      summary: Get public portal staged rollout onboarding config
      operationId: getPortalOnboardingConfig
      responses:
        '200':
          description: Current portal gatekeeper configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalOnboardingConfig'

  /economic/portal/whitelist/add:
    post:
      tags: [Economic]
      summary: Add user DID to whitelist registry (simulation)
      operationId: addWhitelistUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhitelistAddRequest'
      responses:
        '200':
          description: Whitelist entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhitelistAddResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Whitelist capacity reached

  /economic/portal/whitelist/verify:
    post:
      tags: [Economic]
      summary: Verify whitelist access and apply SBM lock on violation
      operationId: verifyWhitelistUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhitelistVerifyRequest'
      responses:
        '200':
          description: Whitelist verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhitelistVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not whitelisted; SBM lock applied
        '423':
          description: SBM lock currently active for source IP

  /economic/revenue/deposit-rent:
    post:
      tags: [Economic]
      summary: Deposit rent into revenue pool for an asset (simulation)
      operationId: depositRevenueRent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevenueDepositRequest'
      responses:
        '200':
          description: Rent deposit accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueDepositResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /economic/revenue/distribute-yield:
    post:
      tags: [Economic]
      summary: Execute atomic snapshot yield distribution (simulation)
      operationId: distributeRevenueYield
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevenueDistributeRequest'
      responses:
        '200':
          description: Distribution completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueDistributeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Empty revenue pool

  /economic/revenue/pool/{assetId}:
    get:
      tags: [Economic]
      summary: Get current revenue pool for an asset
      operationId: getRevenuePool
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Revenue pool state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenuePoolStatus'

  /economic/portal/manifesto/template:
    get:
      tags: [Economic]
      summary: Get whitelist welcome manifesto template
      operationId: getWhitelistManifestoTemplate
      responses:
        '200':
          description: Manifesto template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestoTemplate'

  /economic/portal/manifesto/send-simulation:
    post:
      tags: [Economic]
      summary: Simulate sending whitelist welcome manifesto campaign
      operationId: sendWhitelistManifestoSimulation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManifestoSendSimulationRequest'
      responses:
        '200':
          description: Manifesto campaign queued in simulation mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestoSendSimulationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /economic/sentry/events:
    get:
      tags: [Economic]
      summary: Get onboarding sentry event stream
      operationId: listOnboardingSentryEvents
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Sentry events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentryEventListResponse'
    post:
      tags: [Economic]
      summary: Ingest onboarding sentry event (simulation)
      operationId: ingestOnboardingSentryEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
