global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'complicore-postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'complicore-redis'
    static_configs:
      - targets: ['redis:6379']