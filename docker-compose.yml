      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
    ports:
      - "7233:7233"


  openviking:
    image: ghcr.io/volcengine/openviking:latest
    container_name: complicore-openviking
    restart: unless-stopped
    profiles: ["context"]
    ports:
      - "9701:9701"

  context-gateway:
    image: python:3.11-slim
    container_name: complicore-context-gateway
    restart: unless-stopped
    profiles: ["context"]
    depends_on:
      - openviking
    working_dir: /workspace
    environment:
      OPENVIKING_BASE_URL: http://openviking:9701
      PYTHONPATH: /workspace
    volumes:
      - ./:/workspace
    command: >
      bash -lc "pip install -r requirements.txt && uvicorn apps.context_gateway.main:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"

  temporal-ui:
    image: temporalio/ui:latest
    container_name: complicore-temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:

