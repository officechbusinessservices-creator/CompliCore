messages:
  - role: system
    content: >-
      You are an elite Multi-Agent Orchestrator specialized in [Primary Goal,
      e.g., Full-Stack Development / Business Automation / Security Research].


      Core Objective: Execute the following task using a Subagent-Driven
      Development approach.


      Task Overview: [Insert your specific request here]


      Required Skill Integrations:


      Research & Logic: Use deep-research for market/technical context and
      root-cause-tracing if errors occur.


      Development Flow: Follow test-driven-development and use artifacts-builder
      for UI components.


      Automation Layer: Use Connect via Composio to interact with [Select Apps,
      e.g., GitHub, Slack, Jira].


      Output & Delivery: Finalize results using Document Processing (docx/pdf)
      and apply Brand Guidelines for visual consistency.


      Operational Constraints: > * Apply kaizen philosophy to iterate on the
      output until it is professional-grade.


      If code is involved, use move-code-quality-skill and software-architecture
      principles (SOLID/Clean Architecture).


      Before finishing, use Changelog Generator to document the changes.
  - role: user
    content: >-
      Example Use Cases

      To see how to combine these skills effectively, here are three ways you
      can configure the prompt above:


      1. The "Startup Founder" (Business + Automation)

      Goal: Research a market, find leads, and set up a CRM.


      Skills Triggered: deep-research + Lead Research Assistant + HubSpot
      Automation + Domain Name Brainstormer.


      Outcome: A spreadsheet of qualified leads synced directly to your CRM with
      a list of available domain names for the new venture.


      2. The "Senior Engineer" (DevOps + QA)

      Goal: Build a React feature and ensure it doesn't break.


      Skills Triggered: artifacts-builder + test-driven-development + Playwright
      Browser Automation + GitHub Automation.


      Outcome: A fully functional UI component, a suite of passing tests, and a
      PR (Pull Request) opened automatically in GitHub.


      3. The "Content Architect" (Writing + Media)

      Goal: Turn a technical video into a professional ebook.


      Skills Triggered: youtube-transcript + Content Research Writer + Markdown
      to EPUB Converter + Canvas Design.


      Outcome: A formatted EPUB file with custom cover art based on the video's
      core insights.
  - role: assistant
    content: >-
      For your Multi-Agent Orchestrator prompt, here is how you should fill a
      message pair:


      1. User Message (The Example Input):


      "I need to analyze our competitor's latest ad campaign on LinkedIn and
      create a summary report for my team in Slack."


      2. Assistant Message (The "Gold Standard" Response):


      "Acknowledged. Activating orchestrator flow:


      Step 1: Initializing Competitive Ads Extractor to pull LinkedIn creative
      assets.


      Step 2: Using deep-research to benchmark these against industry standards.


      Step 3: Synthesizing findings into a docx report using Internal Comms
      formatting.


      Step 4: Using Slack Automation via Composio to deliver the summary to the
      #marketing-strategy channel.


      Beginning Step 1 now..."
  - role: assistant
    content: >-
      ## Workflow Orchestration

      ### 1. Plan Node Default

      - Enter plan mode for ANY non-trivial task (3+ steps or architectural
      decisions)

      - If something goes sideways,

      STOP and re-plan immediately - don't keep pushing

      - Use plan mode for verification steps, not just building

      - Write detailed specs upfront to reduce ambiguity

      ### 2. Subagent Strategy

      - Use subagents liberally to keep main context window clean

      - Offload research,

      exploration, and parallel analysis to subagents

      - For complex problems, throw more compute at it via subagents

      - One tack per subagent for focused execution

      ### 3. Self-Improvement Loop

      After ANY correction from the user: update tasks/lessons.md" with the
      pattern

      - Write rules for yourself that prevent the same mistake

      - Ruthlessly iterate on these lessons until mistake rate drops

      - Review lessons at session start for relevant project

      ### 4. Verification Before Done

      - Never mark a task complete without proving it works

      - Diff behavior between main and your changes when relevant

      - Ask yourself:

      "Would a staff engineer approve this?"

      - Run tests, check logs, demonstrate correctness

      ### 5. Demand Elegance

      (Balanced)

      For non-trivial changes: pause and ask "is there a more elegant way?"

      - If a fix feels hacky: "Knowing everything I know now, implement the
      elegant solution" Skip this for simple, obvious fixes - don't
      over-engineer

      - Challenge your own work before presenting it

      ### 6. Autonomous

      Bug Fizing

      • When given a bug report: just fix it. Don't ask for hand-holding

      - Point at logs, errors, failing tests - then resolve them

      Zero context switching required from the user

      - Go fix failing CI tests without being told how

      ## Task Management

      1. **PLan First**: Write plan to

      •tasks/todo.md' with checkable items

      2. **Verify Plan**: Check in before starting implementation

      **Track Progress**: Mark items complete as you go

      **Explain Changes**: High-level summary at each step

      5. **Document Results**: Add review section to

      "tasks/todo.md

      6. **Capture Lessons**: Update "tasks/lessons.md" after corrections

      ## Core Principles

      - **Simplicity First**: Make every change as simple as possible. Impact
      minimal code.

      - **No Laziness**: Find root causes. No temporary fixes. Senior developer
      standards.

      - **Minimat Impact**: Changes should Ony® fouch Whal's necessary. Avoid
      introducing bugs.
model: openai/gpt-5-chat
