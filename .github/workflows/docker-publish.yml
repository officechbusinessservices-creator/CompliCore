# Required repository/organization settings before this workflow will succeed:
#   vars.DOCKER_USER                  — Docker Hub username
#   vars.DOCKER_BUILD_CLOUD_ENDPOINT  — Docker Build Cloud builder endpoint (e.g. myorg/mybuilder)
#   secrets.DOCKER_PAT                — Docker Hub Personal Access Token with read/write scope

name: Docker Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: ${{ vars.DOCKER_BUILD_CLOUD_ENDPOINT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ vars.DOCKER_USER }}/complicore:latest
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
