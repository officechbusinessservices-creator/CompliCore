name: Antigravity Night Shift

on:
  schedule:
    # Run at 10 PM UTC every night
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Task spec name (without .md extension, e.g. stripe-integration)"
        required: false
        default: "stripe-integration"

jobs:
  build:
    name: Builder Agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      branch: ${{ steps.run-builder.outputs.branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the token so the agent can push branches and open PRs
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "Antigravity Agent"
          git config user.email "agent@complicore.ai"

      - name: Run Builder Agent
        id: run-builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TASK="${{ github.event.inputs.task || 'stripe-integration' }}"
          echo "Running builder for task: $TASK"
          npm run agent:build -- --task "$TASK" 2>&1 | tee /tmp/builder-output.txt
          # Extract branch name from builder output for downstream jobs
          BRANCH=$(grep -oP 'agent/[^\s]+' /tmp/builder-output.txt | head -1 || echo "")
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  digest:
    name: Morning Digest
    runs-on: ubuntu-latest
    needs: build
    # Always run digest even if builder fails — we want a report either way
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Digest Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run agent:digest

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: morning-digest-${{ github.run_id }}
          path: tasks/digest-latest.md
          retention-days: 30
