name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps (root)
        run: npm ci

      - name: Frontend lint+type
        run: |
          npm run lint

      - name: Backend lint+type+test
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/rental_test"
          JWT_SECRET: "0123456789abcdef0123456789abcdef"
        run: |
          npm ci
          npm run build --if-present
          npx prisma generate
          npx prisma db push --skip-generate
          npm run test

  frontend-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Clean install
        run: |
          npx rimraf node_modules package-lock.json .next
          npm install
      - name: Build
        run: npm run build

  backend-validate:
    runs-on: ubuntu-latest
    needs: lint-type-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/rental_test"
      JWT_SECRET: "0123456789abcdef0123456789abcdef"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Push schema to test DB
        run: npx prisma db push --skip-generate
      - name: Test (vitest) with coverage
        run: npm run test -- --coverage

  openapi-drift-check:
    runs-on: ubuntu-latest
    needs: lint-type-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/rental_test"
      JWT_SECRET: "0123456789abcdef0123456789abcdef"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps (root)
        run: npm ci
      - name: Validate OpenAPI schema
        run: npm run openapi:validate
      - name: Install deps (backend)
        run: npm ci --prefix backend
      - name: Build backend
        run: npm run build --prefix backend
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Push schema to test DB
        working-directory: backend
        run: npx prisma db push --skip-generate
      - name: Smoke backend contract endpoints
        run: npm run openapi:smoke
