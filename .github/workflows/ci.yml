name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps (root)
        run: npm ci

      - name: Frontend lint+type
        run: |
          npm run lint

      - name: Backend lint+type+test
        working-directory: backend
        run: |
          npm ci
          npm run build --if-present
          npm run test

  frontend-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps (root)
        run: npm ci
      - name: Build
        run: npm run build

  backend-validate:
    runs-on: ubuntu-latest
    needs: lint-type-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Test (vitest) with coverage
        run: npm run test -- --coverage

  openapi-drift-check:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps (root)
        run: npm ci
      - name: Validate OpenAPI schema
        run: npm run openapi:validate
      - name: Install deps (backend)
        run: npm ci --prefix backend
      - name: Build backend
        run: npm run build --prefix backend
      - name: Smoke backend contract endpoints
        run: npm run openapi:smoke
