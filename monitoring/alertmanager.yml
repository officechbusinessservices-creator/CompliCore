route:
  receiver: "slack-default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts: shorter repeat, dedicated channel
    - match:
        severity: critical
      receiver: "slack-critical"
      repeat_interval: 30m
      continue: false

    # Warning alerts: default channel, longer repeat
    - match:
        severity: warning
      receiver: "slack-default"
      repeat_interval: 2h

inhibit_rules:
  # If InstanceDown is firing, suppress HighErrorRate / SlowResponses
  - source_match:
      alertname: InstanceDown
    target_match_re:
      alertname: HighErrorRate|SlowResponses|P99LatencyHigh
    equal: ["job"]

receivers:
  - name: "slack-default"
    slack_configs:
      - api_url: "__ALERTMANAGER_SLACK_WEBHOOK_URL__"
        channel: "__ALERTMANAGER_SLACK_CHANNEL__"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          {{ if .CommonAnnotations.description }}*Details:* {{ .CommonAnnotations.description }}{{ end }}

  - name: "slack-critical"
    slack_configs:
      - api_url: "__ALERTMANAGER_SLACK_WEBHOOK_URL__"
        channel: "__ALERTMANAGER_SLACK_CHANNEL__"
        send_resolved: true
        title: '🚨 CRITICAL [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          {{ if .CommonAnnotations.description }}*Details:* {{ .CommonAnnotations.description }}{{ end }}
          @channel
