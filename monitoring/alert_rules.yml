groups:
- name: CompliCore_Availability
  rules:
  - alert: InstanceDown
    expr: max(up{job="complicore-backend"}) == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "CompliCore backend is unavailable across all deployment slots."
      description: "No backend instance has been reachable for over 1 minute."

  - alert: InstanceFlapping
    expr: changes(up{job="complicore-backend"}[15m]) > 5
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Backend instance is flapping (restarting repeatedly)."
      description: "Instance {{ $labels.instance }} has changed state {{ $value }} times in 15 minutes."

- name: CompliCore_Performance
  rules:
  - alert: HighErrorRate
    expr: |
      (
        sum(rate(http_requests_total{job="complicore-backend",status_code=~"5.."}[5m]))
        /
        clamp_min(sum(rate(http_requests_total{job="complicore-backend"}[5m])), 1)
      ) > 0.05
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Backend 5xx error ratio is above 5%."
      description: "Current error ratio: {{ $value | humanizePercentage }}."

  - alert: CriticalErrorRate
    expr: |
      (
        sum(rate(http_requests_total{job="complicore-backend",status_code=~"5.."}[5m]))
        /
        clamp_min(sum(rate(http_requests_total{job="complicore-backend"}[5m])), 1)
      ) > 0.15
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Backend 5xx error ratio is above 15% — critical."
      description: "Current error ratio: {{ $value | humanizePercentage }}."

  - alert: SlowResponses
    expr: |
      (
        sum(rate(http_request_duration_seconds_sum{job="complicore-backend"}[5m]))
        /
        clamp_min(sum(rate(http_request_duration_seconds_count{job="complicore-backend"}[5m])), 1)
      ) > 0.5
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Backend average response latency is above 500 ms (5m window)."
      description: "Current average latency: {{ $value | humanizeDuration }}."

  - alert: P99LatencyHigh
    expr: |
      histogram_quantile(0.99,
        sum(rate(http_request_duration_seconds_bucket{job="complicore-backend"}[5m])) by (le)
      ) > 2
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "P99 response latency exceeds 2 seconds."
      description: "Current P99: {{ $value | humanizeDuration }}."

- name: CompliCore_Resources
  rules:
  - alert: HighMemoryUsage
    expr: |
      process_resident_memory_bytes{job="complicore-backend"}
      / 1024 / 1024 > 450
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Backend memory usage is above 450 MB."
      description: "Current RSS: {{ $value | humanize1024 }}B."

  - alert: HighCpuUsage
    expr: |
      rate(process_cpu_seconds_total{job="complicore-backend"}[5m]) > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Backend CPU usage is above 80% for 5 minutes."

  - alert: TooManyOpenFileDescriptors
    expr: |
      process_open_fds{job="complicore-backend"}
      / process_max_fds{job="complicore-backend"} > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Backend is using >80% of available file descriptors."

- name: CompliCore_Database
  rules:
  - alert: DatabaseConnectionPoolExhausted
    expr: |
      pg_stat_activity_count{datname="complicore"}
      / pg_settings_max_connections > 0.85
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Database connection pool is >85% full."

  - alert: SlowQueries
    expr: |
      rate(pg_stat_activity_max_tx_duration{datname="complicore"}[5m]) > 30
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Long-running database queries detected (>30s)."
